name: Test private cluster inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create dummy manifest file
        run: |
          mkdir -p /tmp/k8s-manifests
          cat > /tmp/k8s-manifests/deployment.yaml <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: test-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: test-app
            template:
              metadata:
                labels:
                  app: test-app
              spec:
                containers:
                - name: test-app
                  image: nginx:latest
          EOF
      - id: action
        uses: .
        continue-on-error: true
        with:
          manifests: /tmp/k8s-manifests/deployment.yaml
          namespace: default
          strategy: basic
          action: deploy
          pull-images: false
          private-cluster: true
          resource-group: my-resource-group
          name: my-aks-cluster
          token: ${{ github.token }}
      - name: Assert action was invoked (expected to fail without cluster)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked (outcome=$OUTCOME, failure expected without cluster)"
