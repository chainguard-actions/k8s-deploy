name: Test canary strategy deploy
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          manifests: |
            k8s/deployment.yaml
          strategy: canary
          action: deploy
          percentage: 20
          traffic-split-method: pod
          traffic-split-annotations: |
            app.kubernetes.io/managed-by: my-controller
          baseline-and-canary-replicas: 1
          token: ${{ github.token }}
      - name: Assert action ran (expected failure without cluster)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran as expected"
