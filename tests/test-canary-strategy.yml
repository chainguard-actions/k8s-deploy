name: Test canary strategy with traffic-split-annotations
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Invoke action with canary strategy and traffic-split-annotations
        id: action
        uses: .
        continue-on-error: true
        with:
          manifests: actions/hardened/Azure--k8s-deploy/v5.0.4/tests/fixtures/manifests/deployment.yaml
          images: nginx:latest
          strategy: canary
          action: deploy
          traffic-split-method: pod
          traffic-split-annotations: "app.kubernetes.io/managed-by=test"
          percentage: 20
          token: ${{ github.token }}
      - name: Assert action was invoked (may fail without cluster)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked with canary strategy and traffic-split-annotations"
