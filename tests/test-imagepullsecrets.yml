name: Test imagepullsecrets input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Invoke action with imagepullsecrets
        id: action
        uses: .
        continue-on-error: true
        with:
          manifests: actions/hardened/Azure--k8s-deploy/v5.0.4/tests/fixtures/manifests/deployment.yaml
          images: nginx:latest
          imagepullsecrets: my-registry-secret
          strategy: basic
          action: deploy
          namespace: default
          token: ${{ github.token }}
      - name: Assert action was invoked (may fail without cluster)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked with imagepullsecrets input"
