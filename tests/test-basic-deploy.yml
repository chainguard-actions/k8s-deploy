name: Test basic deploy
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          manifests: actions/hardened/Azure--k8s-deploy/v5.1.0/tests/fixtures/manifests/deployment.yaml
          images: nginx:latest
          strategy: basic
          action: deploy
          token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran (expected to fail without cluster)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
