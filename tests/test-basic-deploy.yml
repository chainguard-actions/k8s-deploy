name: Test basic deploy
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          manifests: |
            k8s/deployment.yaml
          images: |
            contosodemo.azurecr.io/helloworld:test
          imagepullsecrets: |
            my-registry-secret
          strategy: basic
          action: deploy
          token: ${{ github.token }}
      - name: Assert action ran (expected failure without cluster)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail without a real cluster context
          # We just verify it was invoked (not skipped)
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran as expected"
