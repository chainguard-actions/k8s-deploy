name: Test basic deploy
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify action inputs are accepted
        id: action
        uses: .
        continue-on-error: true
        with:
          manifests: actions/hardened/Azure--k8s-deploy/v5.0.4/tests/fixtures/manifests/deployment.yaml
          images: nginx:latest
          strategy: basic
          action: deploy
          token: ${{ github.token }}
      - name: Assert action was invoked (may fail without cluster)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail without a real k8s cluster context.
          # We only verify it was invoked (not skipped) and that inputs were accepted.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked with manifests and images inputs"
